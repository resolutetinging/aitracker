<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 產業動態追蹤器</title>
<style>
:root {
  --bg:#eceae6; --surface:#f5f3f0; --card:#faf9f7; --card2:#f0ede9;
  --border:#d8d4ce; --border2:#c8c4be;
  --text:#2c2a28; --text2:#4a4744; --muted:#7a756f; --muted2:#9e9890;
  --hw:#5a7fa8; --corp:#a07040; --app:#4a8a6a; --gloss:#7060a0; --insight:#8a5060; --hist:#607080;
  --core:#3a5a7a; --noise:#888078; --opp:#4a7060; --ethic:#a05040;
  --shadow:0 1px 4px rgba(0,0,0,.08); --shadow2:0 2px 8px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang TC',system-ui,sans-serif;min-height:100vh;padding:20px 24px 40px;line-height:1.5;}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.header-title{font-size:18px;font-weight:700;}
.header-title em{font-style:normal;color:var(--hw);}
.header-right{display:flex;align-items:center;gap:10px;}
.date-badge{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--muted);}
.refresh-btn{background:var(--hw);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .2s;}
.refresh-btn:hover{opacity:.85;}

/* ── Tabs ── */
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;}
.tab-btn:hover{background:var(--surface);color:var(--text2);}
.t-hw   {background:rgba(90,127,168,.10);border-color:var(--hw);   color:var(--hw);}
.t-corp {background:rgba(160,112,64,.10); border-color:var(--corp); color:var(--corp);}
.t-app  {background:rgba(74,138,106,.10); border-color:var(--app);  color:var(--app);}
.t-gloss{background:rgba(112,96,160,.10); border-color:var(--gloss);color:var(--gloss);}
.t-ins  {background:rgba(138,80,96,.10);  border-color:var(--insight);color:var(--insight);}
.t-hist {background:rgba(96,112,128,.10); border-color:var(--hist); color:var(--hist);}

/* ── Panels ── */
.panel{display:none;}.panel.active{display:block;}
.hidden{display:none!important;}

/* ── Metric row ── */
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px;}
.metric-value{font-size:20px;font-weight:700;}
.metric-sub{font-size:11.5px;color:var(--muted);margin-top:3px;}
.c-hw{color:var(--hw);}.c-corp{color:var(--corp);}.c-app{color:var(--app);}.c-warn{color:#a06820;}.c-red{color:#aa4040;}

/* ── Signal strip ── */
.signal-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.signal-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12.5px;display:flex;align-items:center;gap:6px;}
.pill-red   {border-color:#c05050;background:rgba(192,80,80,.06);color:#a03030;}
.pill-yellow{border-color:#b08030;background:rgba(176,128,48,.06);color:#907020;}
.pill-green {border-color:#408060;background:rgba(64,128,96,.06);color:#306850;}

/* ── Section heading ── */
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* ── News cards ── */
.news-grid{display:flex;flex-direction:column;gap:14px;}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 18px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.news-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;}
.hw::before{background:var(--hw);}.corp::before{background:var(--corp);}.app::before{background:var(--app);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.card-title{font-size:14.5px;font-weight:700;line-height:1.45;flex:1;color:var(--text);}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0;border:1px solid;}
.tag-hw  {background:rgba(90,127,168,.10);color:var(--hw);  border-color:rgba(90,127,168,.3);}
.tag-corp{background:rgba(160,112,64,.10); color:var(--corp);border-color:rgba(160,112,64,.3);}
.tag-app {background:rgba(74,138,106,.10); color:var(--app); border-color:rgba(74,138,106,.3);}
.card-body{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:12px;}

/* ── Impact chain ── */
.impact-box{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;}
.impact-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;}
.impact-chain{display:flex;align-items:center;flex-wrap:wrap;gap:5px;font-size:12px;}
.cn{border:1px solid var(--border2);border-radius:5px;padding:3px 9px;background:var(--card);color:var(--text2);white-space:nowrap;}
.cn-up  {border-color:#4a8a6a;color:#3a6a50;background:rgba(74,138,106,.08);}
.cn-down{border-color:#aa4040;color:#883030;background:rgba(170,64,64,.07);}
.cn-warn{border-color:#b08030;color:#907020;background:rgba(176,128,48,.07);}
.chain-arr{color:var(--muted2);font-size:13px;}

/* ── CapEx bars ── */
.capex-section{margin-bottom:20px;}
.capex-bars{display:flex;flex-direction:column;gap:9px;}
.capex-row{display:flex;align-items:center;gap:10px;}
.capex-co{font-size:12.5px;font-weight:600;width:85px;flex-shrink:0;color:var(--text2);}
.capex-track{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:5px;height:24px;overflow:hidden;}
.capex-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:700;color:#fff;}
.b-amz{background:linear-gradient(90deg,#a07040,#886030);}
.b-goog{background:linear-gradient(90deg,#5a7fa8,#486a90);}
.b-ms {background:linear-gradient(90deg,#7060a0,#5a4888);}
.b-meta{background:linear-gradient(90deg,#4a8a6a,#387058);}
.capex-yoy{font-size:11.5px;color:var(--app);font-weight:700;width:48px;text-align:right;}

/* ── Glossary ── */
.gloss-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.gloss-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);}
.gloss-term{font-size:14px;font-weight:800;color:var(--gloss);margin-bottom:3px;}
.gloss-full{font-size:11px;color:var(--muted);margin-bottom:6px;}
.gloss-def{font-size:12.5px;color:var(--text2);line-height:1.55;}
.gloss-why{margin-top:7px;font-size:11.5px;color:var(--gloss);background:rgba(112,96,160,.07);border-radius:5px;padding:5px 9px;border-left:2px solid var(--gloss);}
.gloss-new-badge{display:inline-block;font-size:10px;background:rgba(74,138,106,.12);color:var(--app);border:1px solid rgba(74,138,106,.3);border-radius:8px;padding:1px 7px;margin-left:6px;vertical-align:middle;font-weight:600;}

/* ── Insight panel ── */
.ins-intro{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px;font-size:13px;color:var(--text2);line-height:1.6;box-shadow:var(--shadow);}
.ins-intro strong{color:var(--insight);}
.ins-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:12px;}
.ins-card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.ins-title{font-size:13.5px;font-weight:700;flex:1;line-height:1.4;}
.ins-chain{display:flex;align-items:center;flex-wrap:wrap;gap:5px;font-size:12px;margin-bottom:10px;}
.badge{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0;letter-spacing:.5px;border:1px solid;}
.b-core{background:rgba(58,90,122,.10);color:var(--core);border-color:rgba(58,90,122,.3);}
.b-noise{background:rgba(136,128,120,.10);color:var(--noise);border-color:rgba(136,128,120,.3);}
.b-opp{background:rgba(74,112,96,.10);color:var(--opp);border-color:rgba(74,112,96,.3);}
.ethic-alert{display:flex;align-items:flex-start;gap:7px;background:rgba(160,80,64,.07);border:1px solid rgba(160,80,64,.25);border-radius:6px;padding:8px 11px;font-size:12px;color:var(--ethic);margin-bottom:10px;line-height:1.5;}
.my-insight{display:flex;align-items:flex-start;gap:7px;background:rgba(138,80,96,.07);border:1px solid rgba(138,80,96,.25);border-radius:6px;padding:9px 12px;font-size:12.5px;color:var(--insight);line-height:1.6;font-style:italic;}
.mi-icon{font-size:14px;flex-shrink:0;margin-top:1px;}

/* ── History panel ── */
.hist-list{display:flex;flex-direction:column;gap:12px;}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}
.hist-friday{border-color:rgba(160,112,64,.4);}
.hist-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.hist-card-header:hover{background:var(--card2);}
.hist-date-row{display:flex;align-items:center;gap:10px;}
.hist-date{font-size:14px;font-weight:700;color:var(--text);}
.fri-badge{font-size:11px;background:rgba(160,112,64,.12);border:1px solid rgba(160,112,64,.3);color:var(--corp);padding:2px 9px;border-radius:10px;font-weight:600;}
.hist-meta{display:flex;align-items:center;gap:12px;}
.hist-count{font-size:12px;color:var(--muted);}
.hist-toggle{font-size:12px;color:var(--muted);width:16px;text-align:center;}
.hist-body{border-top:1px solid var(--border);padding:16px;}
.hist-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;margin-top:14px;}
.hist-section-title:first-child{margin-top:0;}
.weekly-summary-box{background:rgba(160,112,64,.06);border:1px solid rgba(160,112,64,.25);border-radius:8px;padding:14px 16px;margin-bottom:16px;}
.ws-title{font-size:13px;font-weight:700;color:var(--corp);margin-bottom:8px;}
.ws-body{font-size:13px;color:var(--text2);line-height:1.65;}
.empty-state{text-align:center;color:var(--muted);font-size:14px;padding:48px 20px;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;padding:4px 8px;border-radius:4px;}
.modal-close:hover{background:var(--card2);}
.modal-title{font-size:17px;font-weight:800;margin-bottom:20px;color:var(--text);}
.modal-step{display:flex;gap:14px;margin-bottom:20px;align-items:flex-start;}
.step-num{width:26px;height:26px;background:var(--hw);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-top:1px;}
.step-content{flex:1;}
.step-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.prompt-box{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:12px;font-family:'Courier New',monospace;font-size:11px;color:var(--text2);line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto;margin-bottom:10px;}
.copy-btn{background:var(--card2);border:1px solid var(--border2);color:var(--text2);padding:7px 14px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;}
.copy-btn:hover{background:var(--border);}
.paste-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;margin-top:4px;}
#json-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:10px;font-family:'Courier New',monospace;font-size:11px;color:var(--text2);resize:vertical;min-height:90px;line-height:1.5;}
#json-input:focus{outline:none;border-color:var(--hw);}
.import-btn{margin-top:14px;width:100%;background:var(--hw);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
.import-btn:hover{opacity:.88;}
#import-msg{margin-top:10px;font-size:13px;text-align:center;min-height:20px;}
.msg-error{color:#aa4040;}.msg-ok{color:#3a7050;}

@media(max-width:680px){
  .metric-row{grid-template-columns:1fr 1fr;}
  .gloss-grid{grid-template-columns:1fr;}
  body{padding:12px 14px 30px;}
}
</style>
</head>
<body>

<header>
  <div class="header-title">📡 AI 產業動態 <em>每日追蹤</em></div>
  <div class="header-right">
    <div class="date-badge" id="today-label">🗓 載入中...</div>
    <button class="refresh-btn" onclick="openModal()">🔄 每日更新</button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn" id="btn-hw"    onclick="sw('hw')">🔩 硬體缺口</button>
  <button class="tab-btn" id="btn-corp"  onclick="sw('corp')">💰 巨頭角力</button>
  <button class="tab-btn" id="btn-app"   onclick="sw('app')">🤖 新興應用</button>
  <button class="tab-btn" id="btn-gloss" onclick="sw('gloss')">📚 專有名詞</button>
  <button class="tab-btn" id="btn-ins"   onclick="sw('ins')">🎯 個人洞察</button>
  <button class="tab-btn" id="btn-hist"  onclick="sw('hist')">📅 本週紀錄</button>
</div>

<div id="panel-hw"    class="panel"></div>
<div id="panel-corp"  class="panel"></div>
<div id="panel-app"   class="panel"></div>
<div id="panel-gloss" class="panel"></div>
<div id="panel-ins"   class="panel"></div>
<div id="panel-hist"  class="panel"></div>

<!-- ── Modal ── -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">🔄 每日更新</div>

    <div class="modal-step">
      <div class="step-num">1</div>
      <div class="step-content">
        <div class="step-label">複製 Prompt → 貼入 Claude.ai → 取得 JSON 回傳</div>
        <div class="prompt-box" id="prompt-display"></div>
        <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">📋 複製 Prompt</button>
      </div>
    </div>

    <div class="modal-step">
      <div class="step-num">2</div>
      <div class="step-content">
        <div class="step-label">將 Claude 回傳的 JSON 貼入下方</div>
        <textarea id="json-input" placeholder='{ "date": "2026-05-06", "hw": [...], "corp": [...], "app": [...], ... }'></textarea>
      </div>
    </div>

    <button class="import-btn" onclick="importJSON()">✅ 匯入今日資料</button>
    <div id="import-msg"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  SEED DATA  (2026-05-05)
// ══════════════════════════════════════════════════════════════════
const SEED = {
  date:"2026-05-05", is_friday:false, weekly_summary:null, glossary_new:[],
  hw:[
    {title:"NVIDIA 獨占 TSMC CoWoS 逾 60% 產能，AMD 被結構性限制",layer:"封裝層",
     body:"TSMC CoWoS 以 80% 年複合成長率擴建，但 NVIDIA 透過長期預訂鎖定了 2025–2026 年超過六成產能。AMD MI350/MI400 系列只能依靠剩餘分配，在市佔上受到結構性限制。TSMC 已將部分封裝步驟外包至 ASE、Amkor 等 OSAT 廠商以紓解壓力。",
     chain:[{label:"TSMC 議價能力↑",type:"up"},{label:"ASE/Amkor 溢出訂單↑",type:"up"},{label:"AMD 市佔受限↓",type:"down"},{label:"非NVIDIA CSP 交期拉長↓",type:"down"}],
     rating:"core",insight:"封裝是隱形的護城河——NVIDIA 真正的壁壘不只是 CUDA，而是把 TSMC 最稀缺的資源提前鎖死了。"},
    {title:"SK Hynix HBM 62% 市占；Micron 坦承只能滿足需求的 50～66%",layer:"記憶體層",
     body:"三家 HBM 供應商均已上調合約價，高個位數至高十幾%不等。Micron 關閉消費者品牌 Crucial 全力轉攻 HBM/AI 伺服器市場。HBM3E 每 GB 耗用晶圓量是 DDR5 的 3 倍，PC/手機 DDR5 也跟著吃緊，HP、Lenovo 已提示漲價。",
     chain:[{label:"SK Hynix/Micron HBM ASP↑",type:"up"},{label:"GPU BOM 成本↑",type:"down"},{label:"消費者 DDR5 漲價↓",type:"down"},{label:"PC OEM 毛利壓縮↓",type:"down"}],
     rating:"core",insight:"記憶體短缺不只是 AI 圈的事——你的下一台電腦可能因為 HBM 的搶奪而變貴，這是 AI 基礎設施繁榮的隱藏成本。"},
    {title:"TSMC 轉向 CoWoS-L（LSI Bridge）解決 Blackwell/Rubin 超越光刻極限問題",layer:"先進封裝",
     body:"NVIDIA Blackwell 系列晶片尺寸已超越光刻機單次曝光極限（reticle limit），TSMC 從傳統 CoWoS-S 轉型至 CoWoS-L，通過拼接多個 chiplet 實現更大封裝。嘉義 AP7 廠及亞利桑那兩座封裝廠均以此為目標，但美國製晶片目前仍需回台完成封裝。",
     chain:[{label:"TSMC 嘉義廠產能↑",type:"up"},{label:"NVIDIA Rubin 時程↑",type:"up"},{label:"台灣地緣集中風險⚠️",type:"warn"},{label:"Intel 封裝服務機會窗口↑",type:"warn"}],
     rating:"noise",ethic:"全球 AI 加速器的封裝幾乎全數依賴台灣單一地點，任何地緣政治衝突或天災都可能瞬間凍結全球 AI 硬體供給——這是被低估的系統性風險。",insight:"這是技術細節，但揭示了一個戰略真相：AI 的命脈目前實體上集中在一座島嶼。"}
  ],
  corp:[
    {title:"Microsoft CapEx 上修至 $1,900 億，其中 $250 億來自記憶體元件漲價",layer:"需求端",
     body:"CFO Amy Hood 透露追加的 $250 億並非採購更多硬體，而是同等硬體的成本膨脹。即使如此投入，「Azure 至少在 2026 年底前仍持續處於容量受限狀態」。約 2/3 支出流向 GPU/CPU。",
     chain:[{label:"HBM 廠商漲價成真↑",type:"up"},{label:"Microsoft CapEx 膨脹但產能未增⚠️",type:"warn"},{label:"Azure 企業客戶等待拉長↓",type:"down"},{label:"NVIDIA GPU 議價能力↑",type:"up"}],
     rating:"core",insight:"這說明 AI 產業現在是「錢多但貨少」——巨頭願意花錢，但供應鏈跟不上，真正稀缺的是實體產能而非資本。"},

function loadHistory(){
  try{ const r=localStorage.getItem('aitracker_v3'); return r?JSON.parse(r):[]; }catch(e){return [];}
}
function saveHistory(h){
  h.sort((a,b)=>b.date.localeCompare(a.date));
  h=h.slice(0,7);
  localStorage.setItem('aitracker_v3',JSON.stringify(h));
}
function upsertDay(data){
  let h=loadHistory();
  const i=h.findIndex(x=>x.date===data.date);
  if(i>=0) h[i]=data; else h.push(data);
  saveHistory(h);
}
function getLatest(){
  const h=loadHistory();
  return h.length>0?h[0]:SEED;
}
function ensureSeed(){
  if(loadHistory().length===0){ saveHistory([SEED]); }
}

{
  "date": "${ds}",
  "is_friday": ${isFri},
  "hw": [
    {
      "title": "新聞標題",
      "layer": "封裝層/記憶體層/先進封裝/散熱層（四選一）",
      "body": "2-3句重點摘要",

function chainHtml(chain){
  return chain.map((c,i)=>{
    const cls=c.type==='up'?'cn-up':c.type==='down'?'cn-down':'cn-warn';
    const arr=i<chain.length-1?'<span class="chain-arr">→</span>':'';
    return `<span class="cn ${cls}">${c.label}</span>${arr}`;
  }).join('');
}

function newsCardHtml(item,ptype){
  const tc=ptype==='hw'?'tag-hw':ptype==='corp'?'tag-corp':'tag-app';
  const ethic=item.ethic?`<div class="ethic-alert">⚠️ <strong>Safety Alert</strong>：${item.ethic}</div>`:'';
  return `<div class="news-card ${ptype}">
    <div class="card-top"><div class="card-title">${item.title}</div><span class="tag ${tc}">${item.layer}</span></div>
    <div class="card-body">${item.body}</div>${ethic}
    <div class="impact-box"><div class="impact-title">供應鏈影響鏈</div><div class="impact-chain">${chainHtml(item.chain)}</div></div>
  </div>`;
}

function badgeHtml(r){
  const m={core:'<span class="badge b-core">CORE</span>',noise:'<span class="badge b-noise">NOISE</span>',opp:'<span class="badge b-opp">OPP</span>'};
  return m[r]||'';
}

function insCardHtml(item){
  const ethic=item.ethic?`<div class="ethic-alert">⚠️ <strong>Safety Alert</strong>：${item.ethic}</div>`:'';
  return `<div class="ins-card">
    <div class="ins-card-top">${badgeHtml(item.rating)}<div class="ins-title">${item.title}</div></div>
    <div class="ins-chain">${chainHtml(item.chain)}</div>
    ${ethic}
    <div class="my-insight"><span class="mi-icon">💡</span>${item.insight}</div>
  </div>`;
}

function formatDate(s){
  const days=['日','一','二','三','四','五','六'];
  const d=new Date(s+'T12:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（週${days[d.getDay()]}）`;
}

        <div class="gloss-full">${g.full}</div>
        <div class="gloss-def">${g.def}</div>
        <div class="gloss-why">${g.why}</div>
      </div>`).join('')}
    </div>`;
}

function renderHistory(){
  const hist=loadHistory();
  if(!hist.length){
    document.getElementById('panel-hist').innerHTML='<div class="empty-state">尚無歷史紀錄，點擊「每日更新」匯入資料後即可在此查閱。</div>';
    return;
  }
  const cards=hist.map((d,i)=>{
    const ws=d.weekly_summary?`<div class="weekly-summary-box"><div class="ws-title">📊 本週摘要（週報）</div><div class="ws-body">${d.weekly_summary}</div></div>`:'';
    const hwHtml=d.hw?.length?`<div class="hist-section-title">🔩 硬體缺口</div><div class="news-grid">${d.hw.map(x=>newsCardHtml(x,'hw')).join('')}</div>`:'';
    const coHtml=d.corp?.length?`<div class="hist-section-title">💰 巨頭角力</div><div class="news-grid">${d.corp.map(x=>newsCardHtml(x,'corp')).join('')}</div>`:'';
    const apHtml=d.app?.length?`<div class="hist-section-title">🤖 新興應用</div><div class="news-grid">${d.app.map(x=>newsCardHtml(x,'app')).join('')}</div>`:'';
    return `<div class="hist-card ${d.is_friday?'hist-friday':''}">
      <div class="hist-card-header" onclick="toggleHist(${i})">
        <div class="hist-date-row">
          <span class="hist-date">${formatDate(d.date)}</span>
          ${d.is_friday?'<span class="fri-badge">📊 週報</span>':''}
        </div>
        <div class="hist-meta">
          <span class="hist-count">🔩${d.hw?.length||0} 💰${d.corp?.length||0} 🤖${d.app?.length||0}</span>
          <span class="hist-toggle" id="htog-${i}">▼</span>
        </div>
      </div>
      <div class="hist-body hidden" id="hbody-${i}">${ws}${hwHtml}${coHtml}${apHtml}</div>
    </div>`;
  }).join('');
  document.getElementById('panel-hist').innerHTML=`
    <div class="sec-title">近一週每日紀錄（最新在上，最多留存 7 天）</div>
    <div class="hist-list">${cards}</div>`;
}

// ══════════════════════════════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════════════════════════════
function openModal(){
  document.getElementById('prompt-display').textContent=genPrompt();
  document.getElementById('json-input').value='';
  document.getElementById('import-msg').textContent='';
  document.getElementById('copy-btn').textContent='📋 複製 Prompt';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modal-overlay').classList.add('hidden');
}
function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('prompt-display').textContent).then(()=>{
    const b=document.getElementById('copy-btn');
    b.textContent='✅ 已複製！';
    setTimeout(()=>b.textContent='📋 複製 Prompt',2000);
  });
}
function importJSON(){
  const raw=document.getElementById('json-input').value.trim();
  const msg=document.getElementById('import-msg');
  if(!raw){msg.textContent='⚠️ 請貼上 JSON 後再匯入。';msg.className='msg-error';return;}
  let data;
  try{
    const cleaned=raw.replace(/^```json?\n?/,'').replace(/\n?```$/,'').trim();
    data=JSON.parse(cleaned);
  }catch(e){msg.textContent='❌ JSON 格式有誤，請確認 Claude 的輸出為純 JSON。';msg.className='msg-error';return;}
  if(!data.date||!data.hw||!data.corp||!data.app){
    msg.textContent='❌ 缺少必要欄位（date, hw, corp, app）。';msg.className='msg-error';return;
  }
  upsertDay(data);
  renderDay(data);
  renderGlossary();
  renderHistory();
  msg.textContent=`✅ ${formatDate(data.date)} 的資料已成功匯入！`;
  msg.className='msg-ok';
  setTimeout(closeModal,1600);
}

// ══════════════════════════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════════════════════════
const TAB_CLS={hw:'t-hw',corp:'t-corp',app:'t-app',gloss:'t-gloss',ins:'t-ins',hist:'t-hist'};
function sw(tab){
  Object.keys(TAB_CLS).forEach(k=>{
    document.getElementById('panel-'+k).classList.remove('active');
    document.getElementById('btn-'+k).classList.remove(...Object.values(TAB_CLS));
  });
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('btn-'+tab).classList.add(TAB_CLS[tab]);
}

function toggleHist(i){
  const b=document.getElementById('hbody-'+i);
  const t=document.getElementById('htog-'+i);
  b.classList.toggle('hidden');
  t.textContent=b.classList.contains('hidden')?'▼':'▲';
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
function init(){
  ensureSeed();
  renderDay(getLatest());
  renderGlossary();
  renderHistory();
  sw('hw');
}
init();
</script>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 產業動態追蹤器</title>
<style>
:root {
  --bg:#eceae6;--surface:#f5f3f0;--card:#faf9f7;--card2:#f0ede9;
  --border:#d8d4ce;--border2:#c8c4be;
  --text:#2c2a28;--text2:#4a4744;--muted:#7a756f;--muted2:#9e9890;
  /* 去除紫/粉，改為藍灰/青藍 */
  --hw:#5a7fa8;--corp:#a07040;--app:#4a8a6a;
  --gloss:#4a6880;--insight:#3a6860;--hist:#607080;
  --core:#3a5a7a;--noise:#686460;--opp:#3a6858;--ethic:#906030;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','PingFang TC',system-ui,sans-serif;min-height:100vh;padding:20px 24px 40px;line-height:1.5;}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.header-title{font-size:18px;font-weight:700;}
.header-title em{font-style:normal;color:var(--hw);}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.date-badge{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--muted);}
.update-badge{background:rgba(74,138,106,.10);border:1px solid rgba(74,138,106,.3);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--app);}
.manual-btn{background:var(--card);border:1px solid var(--border2);color:var(--muted);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;}
.manual-btn:hover{background:var(--card2);}

/* ── Loading ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--hw);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:14px;color:var(--muted);}

/* ── Nav Tabs ── */
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.tab-btn{padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;}
.tab-btn:hover{background:var(--surface);color:var(--text2);}
.t-hw   {background:rgba(90,127,168,.10);border-color:var(--hw);   color:var(--hw);}
.t-corp {background:rgba(160,112,64,.10); border-color:var(--corp); color:var(--corp);}
.t-app  {background:rgba(74,138,106,.10); border-color:var(--app);  color:var(--app);}
.t-gloss{background:rgba(74,104,128,.10); border-color:var(--gloss);color:var(--gloss);}
.t-ins  {background:rgba(58,104,96,.10);  border-color:var(--insight);color:var(--insight);}
.t-hist {background:rgba(96,112,128,.10); border-color:var(--hist); color:var(--hist);}

/* ── Panels ── */
.panel{display:none;}.panel.active{display:block;}
.hidden{display:none!important;}

/* ── Metrics ── */
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);}
.metric-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px;}
.metric-value{font-size:20px;font-weight:700;}
.metric-sub{font-size:11.5px;color:var(--muted);margin-top:3px;}
.c-hw{color:var(--hw);}.c-corp{color:var(--corp);}.c-app{color:var(--app);}.c-warn{color:#906030;}.c-red{color:#884040;}

/* ── Signals ── */
.signal-strip{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.signal-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12.5px;}
.pill-red   {border-color:#b05050;background:rgba(176,80,80,.06);color:#883030;}
.pill-yellow{border-color:#a07828;background:rgba(160,120,40,.06);color:#806020;}
.pill-green {border-color:#408060;background:rgba(64,128,96,.06);color:#306850;}

/* ── Section title ── */
.sec-title{font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* ── News cards ── */
.news-grid{display:flex;flex-direction:column;gap:14px;}
.news-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 18px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.news-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;}
.hw::before{background:var(--hw);}.corp::before{background:var(--corp);}.app::before{background:var(--app);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;}
.card-title{font-size:14.5px;font-weight:700;line-height:1.45;flex:1;}
.tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0;border:1px solid;}
.tag-hw  {background:rgba(90,127,168,.10);color:var(--hw);  border-color:rgba(90,127,168,.3);}
.tag-corp{background:rgba(160,112,64,.10); color:var(--corp);border-color:rgba(160,112,64,.3);}
.tag-app {background:rgba(74,138,106,.10); color:var(--app); border-color:rgba(74,138,106,.3);}
/* 新聞 body：句號後換行 */
.card-body{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:12px;}
.card-body p{margin-bottom:4px;}
.impact-box{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;}
.impact-title{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;}
.impact-chain{display:flex;align-items:center;flex-wrap:wrap;gap:5px;font-size:12px;}
.cn{border:1px solid var(--border2);border-radius:5px;padding:3px 9px;background:var(--card);color:var(--text2);white-space:nowrap;}
.cn-up  {border-color:#4a8a6a;color:#2a5a40;background:rgba(74,138,106,.08);}
.cn-down{border-color:#884040;color:#663030;background:rgba(136,64,64,.07);}
.cn-warn{border-color:#a07828;color:#806020;background:rgba(160,120,40,.07);}
.chain-arr{color:var(--muted2);font-size:13px;}
.ethic-alert{display:flex;align-items:flex-start;gap:7px;background:rgba(144,96,48,.07);border:1px solid rgba(144,96,48,.25);border-radius:6px;padding:8px 11px;font-size:12px;color:var(--ethic);margin-bottom:12px;line-height:1.5;}

/* ── Source link ── */
.card-source{margin-top:8px;font-size:11.5px;}
.card-source a{color:var(--hw);text-decoration:none;}
.card-source a:hover{text-decoration:underline;}

/* ── Glossary category editor ── */
.gloss-cat-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.gloss-cat-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;border:1px solid;cursor:pointer;background:rgba(74,104,128,.08);color:var(--gloss);border-color:rgba(74,104,128,.3);}
.gloss-cat-badge:hover{background:rgba(74,104,128,.16);}
.gloss-cat-picker{display:none;position:absolute;z-index:100;background:var(--card);border:1px solid var(--border2);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:6px;min-width:160px;}
.gloss-cat-picker.open{display:block;}
.gloss-picker-opt{padding:6px 12px;font-size:12.5px;cursor:pointer;border-radius:5px;color:var(--text2);}
.gloss-picker-opt:hover{background:var(--card2);}
.gloss-card{position:relative;}

/* ── History notes ── */
.hist-note-section{margin-top:16px;border-top:1px solid var(--border);padding-top:14px;}
.hist-note-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:700;margin-bottom:8px;}
.hist-note-area{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-size:13px;color:var(--text);font-family:inherit;resize:vertical;min-height:72px;line-height:1.55;}
.hist-note-area:focus{outline:none;border-color:var(--insight);}
.hist-note-saved{font-size:11.5px;color:var(--app);margin-top:5px;height:16px;}

/* ── Taiwan supply chain diagram (HW panel) ── */
.tw-chain{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:18px;box-shadow:var(--shadow);}
.tw-chain-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:14px;}
.tw-flow{display:flex;align-items:center;flex-wrap:wrap;gap:0;}
.tw-node{background:var(--card2);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;text-align:center;min-width:100px;}
.tw-node-label{font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px;}
.tw-node-sub{font-size:10px;color:var(--muted);}
.tw-arrow{display:flex;flex-direction:column;align-items:center;padding:0 6px;}
.tw-arrow-line{font-size:18px;color:var(--muted2);line-height:1;}
.tw-arrow-label{font-size:10px;color:var(--muted);white-space:nowrap;}
.tw-node.n-hw{border-color:var(--hw);background:rgba(90,127,168,.08);}
.tw-node.n-mem{border-color:#7080a0;background:rgba(112,128,160,.08);}
.tw-node.n-pkg{border-color:var(--corp);background:rgba(160,112,64,.08);}
.tw-node.n-end{border-color:var(--app);background:rgba(74,138,106,.08);}

/* ── App sector focus ── */
.app-sector-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:18px;}
.app-sector-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);}
.asc-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.asc-icon{font-size:18px;}
.asc-title{font-size:13px;font-weight:700;color:var(--text);}
.asc-tag{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:10px;border:1px solid;}
.asc-tag-agentic{background:rgba(74,104,128,.10);color:var(--gloss);border-color:rgba(74,104,128,.3);}
.asc-tag-physical{background:rgba(74,138,106,.10);color:var(--app);border-color:rgba(74,138,106,.3);}
.asc-tag-inference{background:rgba(58,90,122,.10);color:var(--core);border-color:rgba(58,90,122,.3);}
.asc-body{font-size:12.5px;color:var(--text2);line-height:1.6;}
.asc-effect{margin-top:8px;font-size:11.5px;color:var(--muted);padding-top:6px;border-top:1px solid var(--border);}

/* ── CapEx bars ── */
.capex-section{margin-bottom:20px;}
.capex-bars{display:flex;flex-direction:column;gap:9px;}
.capex-row{display:flex;align-items:center;gap:10px;}
.capex-co{font-size:12.5px;font-weight:600;width:85px;flex-shrink:0;color:var(--text2);}
.capex-track{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:5px;height:24px;overflow:hidden;}
.capex-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;font-size:12px;font-weight:700;color:#fff;}
.b-amz{background:linear-gradient(90deg,#a07040,#886030);}
.b-goog{background:linear-gradient(90deg,#5a7fa8,#486a90);}
.b-ms{background:linear-gradient(90deg,#507090,#3a5878);}
.b-meta{background:linear-gradient(90deg,#4a8a6a,#387058);}
.capex-yoy{font-size:11.5px;color:var(--app);font-weight:700;width:48px;text-align:right;}

/* ── Glossary ── */
.gloss-cat-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-top:20px;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.gloss-cat-header:first-child{margin-top:0;}
.gloss-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:4px;}
.gloss-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);}
.gloss-term{font-size:15px;font-weight:800;color:var(--gloss);margin-bottom:2px;}
.gloss-full{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
.gloss-def{font-size:12px;color:var(--text2);line-height:1.55;}
.gloss-why{margin-top:7px;font-size:11.5px;color:var(--gloss);background:rgba(74,104,128,.07);border-radius:5px;padding:5px 9px;border-left:2px solid var(--gloss);}
.new-badge{display:inline-block;font-size:10px;background:rgba(74,138,106,.12);color:var(--app);border:1px solid rgba(74,138,106,.3);border-radius:8px;padding:1px 7px;margin-left:6px;font-weight:600;}

/* ── Insight panel ── */
.ins-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.ins-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.ins-legend-item .badge{font-size:10px;}
.badge{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0;letter-spacing:.5px;border:1px solid;}
.b-core {background:rgba(58,90,122,.10);color:var(--core);border-color:rgba(58,90,122,.3);}
.b-noise{background:rgba(104,100,96,.10);color:var(--noise);border-color:rgba(104,100,96,.3);}
.b-opp  {background:rgba(58,104,88,.10);color:var(--opp);border-color:rgba(58,104,88,.3);}

/* ── Insight sub-tabs ── */
.ins-subtabs{display:flex;gap:6px;margin-bottom:14px;}
.ins-stab{padding:7px 18px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;}
.ins-stab:hover{background:var(--card2);}
.ins-stab.active-core{background:rgba(58,90,122,.10);border-color:var(--core);color:var(--core);}
.ins-stab.active-noise{background:rgba(104,100,96,.10);border-color:var(--noise);color:var(--noise);}
.ins-stab.active-opp{background:rgba(58,104,88,.10);border-color:var(--opp);color:var(--opp);}
.ins-subpanel{display:none;}.ins-subpanel.active{display:block;}

/* ── Insight accordion card ── */
.ins-card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;}
.ins-card-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none;}
.ins-card-header:hover{background:var(--card2);}
.ins-title{font-size:14px;font-weight:700;flex:1;line-height:1.4;}
.ins-toggle{font-size:12px;color:var(--muted);width:16px;text-align:center;flex-shrink:0;}
.ins-body{border-top:1px solid var(--border);padding:14px 16px;display:none;}
.ins-body.open{display:block;}
.ins-chain{display:flex;align-items:center;flex-wrap:wrap;gap:5px;font-size:12px;margin-bottom:12px;}
.ins-insight{background:rgba(58,104,96,.07);border:1px solid rgba(58,104,96,.2);border-radius:6px;padding:9px 12px;font-size:13px;color:var(--insight);line-height:1.6;}
.ins-insight-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--insight);margin-bottom:4px;}

/* ── History ── */
.hist-list{display:flex;flex-direction:column;gap:12px;}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow);}
.hist-friday{border-color:rgba(160,112,64,.4);}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none;}
.hist-header:hover{background:var(--card2);}
.hist-date-row{display:flex;align-items:center;gap:10px;}
.hist-date{font-size:14px;font-weight:700;}
.fri-badge{font-size:11px;background:rgba(160,112,64,.12);border:1px solid rgba(160,112,64,.3);color:var(--corp);padding:2px 9px;border-radius:10px;font-weight:600;}
.hist-meta{display:flex;align-items:center;gap:12px;}
.hist-count{font-size:12px;color:var(--muted);}
.hist-toggle{font-size:12px;color:var(--muted);width:16px;text-align:center;}
.hist-body{border-top:1px solid var(--border);padding:16px;}
.hist-sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;margin-top:14px;}
.hist-sec:first-child{margin-top:0;}
.weekly-box{background:rgba(160,112,64,.06);border:1px solid rgba(160,112,64,.25);border-radius:8px;padding:14px 16px;margin-bottom:16px;}
.ws-title{font-size:13px;font-weight:700;color:var(--corp);margin-bottom:8px;}
.ws-body{font-size:13px;color:var(--text2);line-height:1.65;}
.empty-state{text-align:center;color:var(--muted);font-size:14px;padding:48px 20px;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:18px;color:var(--muted);cursor:pointer;}
.modal-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.modal-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.modal-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;}
#json-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:10px;font-family:'Courier New',monospace;font-size:11px;color:var(--text2);resize:vertical;min-height:100px;line-height:1.5;}
#json-input:focus{outline:none;border-color:var(--hw);}
.import-btn{margin-top:12px;width:100%;background:var(--hw);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
.import-btn:hover{opacity:.88;}
#import-msg{margin-top:10px;font-size:13px;text-align:center;min-height:20px;}
.msg-error{color:#884040;}.msg-ok{color:#3a7050;}

@media(max-width:900px){.gloss-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:680px){
  .metric-row{grid-template-columns:1fr 1fr;}
  .gloss-grid{grid-template-columns:1fr;}
  .app-sector-grid{grid-template-columns:1fr;}
  .tw-flow{gap:4px;}
  body{padding:12px 14px 30px;}
}
</style>
</head>
<body>

<header>
  <div class="header-title">📡 AI 產業動態 <em>每日追蹤</em></div>
  <div class="header-right">
    <div class="date-badge" id="today-label">🗓 載入中...</div>
    <div class="update-badge" id="auto-badge" style="display:none">⚡ 自動更新</div>
    <button class="manual-btn" onclick="openModal()">手動匯入</button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn" id="btn-hw"    onclick="sw('hw')">🔩 硬體缺口</button>
  <button class="tab-btn" id="btn-corp"  onclick="sw('corp')">💰 巨頭角力</button>
  <button class="tab-btn" id="btn-app"   onclick="sw('app')">🤖 新興應用</button>
  <button class="tab-btn" id="btn-gloss" onclick="sw('gloss')">📚 專有名詞</button>
  <button class="tab-btn" id="btn-ins"   onclick="sw('ins')">🎯 個人洞察</button>
  <button class="tab-btn" id="btn-hist"  onclick="sw('hist')">📅 本週紀錄</button>
</div>

<div id="panel-hw"    class="panel"></div>
<div id="panel-corp"  class="panel"></div>
<div id="panel-app"   class="panel"></div>
<div id="panel-gloss" class="panel"></div>
<div id="panel-ins"   class="panel"></div>
<div id="panel-hist"  class="panel"></div>

<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">📥 手動匯入資料</div>
    <div class="modal-sub">Dashboard 每天 08:00 由 GitHub Actions 自動更新。<br>如需手動覆蓋，請貼入 JSON：</div>
    <div class="modal-label">貼上 JSON 資料</div>
    <textarea id="json-input" placeholder='{ "date": "2026-05-07", "hw": [...], ... }'></textarea>
    <button class="import-btn" onclick="importJSON()">✅ 匯入</button>
    <div id="import-msg"></div>
  </div>
</div>

<script>

let HISTORY = [];

async function fetchHistory() {
  try {
    const res = await fetch('./data/history.json?v=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    HISTORY = data;
    try { localStorage.setItem('aitracker_cache', JSON.stringify(data)); } catch(e){}
    document.getElementById('auto-badge').style.display = '';
    return data;
  } catch(e) {
    try {
      const cached = localStorage.getItem('aitracker_cache');
      if (cached) { HISTORY = JSON.parse(cached); return HISTORY; }
    } catch(e2){}
    return [];
  }
}

  hist.sort((a,b) => b.date.localeCompare(a.date));

}

function fmtDate(s) {
  const days = ['日','一','二','三','四','五','六'];
  const d = new Date(s + 'T12:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（週${days[d.getDay()]}）`;
}

// 句點/。後換行
function fmtBody(text) {
  const lines = text.split(/(?<=[。.])\s*/);
  return lines.filter(l=>l.trim()).map(l=>`<p>${l.trim()}</p>`).join('');
}

function chainHtml(chain) {
  return chain.map((c,i) => {
    const cls = c.type==='up'?'cn-up':c.type==='down'?'cn-down':'cn-warn';
    const arr = i < chain.length-1 ? '<span class="chain-arr">→</span>' : '';
    return `<span class="cn ${cls}">${c.label}</span>${arr}`;
  }).join('');
}

function newsCard(item, ptype) {
  const tc = ptype==='hw'?'tag-hw':ptype==='corp'?'tag-corp':'tag-app';
  const eth = item.ethic
    ? `<div class="ethic-alert">⚠️ <strong>Safety Alert</strong>：${item.ethic}</div>` : '';
  // Only show source if URL looks real (starts with https:// and has a domain)
  const validUrl = item.source && /^https?:\/\/[a-z0-9.-]+\.[a-z]{2,}/i.test(item.source);
  const src = validUrl
    ? `<div class="card-source">來源：<a href="${item.source}" target="_blank" rel="noopener">${item.source_label||new URL(item.source).hostname}</a></div>` : '';
  return `<div class="news-card ${ptype}">
    <div class="card-top"><div class="card-title">${item.title}</div><span class="tag ${tc}">${item.layer}</span></div>
    <div class="card-body">${fmtBody(item.body)}</div>${eth}

    <div class="impact-chain">${chainHtml(item.chain)}</div></div>${src}

}

//  GLOSSARY — category editor
// ══════════════════════════════════════════════════════════════════
const CAT_MAP = { role:0, semiconductor:1, ai_technique:2, hardware:1 };
const CAT_DEFS = [
  {key:'role',         label:'Role'},
  {key:'semiconductor',label:'Semiconductor'},
  {key:'ai_technique', label:'AI Technique'},
  {key:'hardware',     label:'Hardware'},
];

function loadCatOverrides() {
  try { return JSON.parse(localStorage.getItem('gloss_cat')||'{}'); } catch(e) { return {}; }
}
function saveCatOverride(term, catKey) {
  const o = loadCatOverrides(); o[term] = catKey;
  localStorage.setItem('gloss_cat', JSON.stringify(o));
}
function togglePicker(id) {
  document.querySelectorAll('.gloss-cat-picker.open').forEach(p=>{ if(p.id!==id) p.classList.remove('open'); });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.gloss-card')) document.querySelectorAll('.gloss-cat-picker.open').forEach(p=>p.classList.remove('open'));
});
function setCat(term, catKey, pickerId) {
  saveCatOverride(term, catKey);
  document.getElementById(pickerId).classList.remove('open');
  renderGlossary(HISTORY);
}

function renderGlossary(hist) {
  const overrides = loadCatOverrides();
  const seen = new Set();
  const cats = GLOSS_CATS.map(c => ({...c, terms:[...c.terms]}));
  cats.forEach(cat => cat.terms.forEach(t => seen.add(t.term)));

  // Collect new terms from history
  const extra = {};
  (hist||[]).forEach(d => {
    (d.glossary_new||[]).forEach(g => {
      if (!seen.has(g.term)) { seen.add(g.term); extra[g.term] = {...g, _new:true}; }
    });
  });

  // Place each term (base + extra) into correct category, respecting overrides
  Object.values(extra).forEach(g => {
    const effectiveCat = overrides[g.term] || g.category;
    const idx = CAT_MAP[effectiveCat];
    if (idx !== undefined) cats[idx].terms.push(g);
    // else goes to uncategorized below
  });

  // Apply overrides to base terms (move between cats)
  cats.forEach((cat, ci) => {
    cat.terms = cat.terms.filter(g => {
      const ov = overrides[g.term];
      if (!ov) return true;
      const destIdx = CAT_MAP[ov];
      if (destIdx === ci) return true;
      if (destIdx !== undefined) { cats[destIdx].terms.push(g); return false; }
      return true;
    });
  });

  const uncategorized = Object.values(extra).filter(g => {
    const eff = overrides[g.term] || g.category;
    return CAT_MAP[eff] === undefined;
  });

  const allCats = [...cats];
  if (uncategorized.length) allCats.push({label:'新增術語 New Terms', terms: uncategorized});

  function catOfTerm(g) {
    return overrides[g.term] || g.category ||
      (allCats[0].terms.includes(g)?'role': allCats[1].terms.includes(g)?'semiconductor':
       allCats[2].terms.includes(g)?'ai_technique':'');
  }

  document.getElementById('panel-gloss').innerHTML = allCats.map(cat => `
    <div class="gloss-cat-header">${cat.label}（${cat.terms.length}）</div>
    <div class="gloss-grid">
      ${cat.terms.map(g => {
        const ckey = overrides[g.term] || g.category || '';
        const clabel = CAT_DEFS.find(c=>c.key===ckey)?.label || '分類';
        const pid = 'gp_'+g.term.replace(/[^a-z0-9]/gi,'_');
        const opts = CAT_DEFS.map(c=>`<div class="gloss-picker-opt" onclick="setCat('${g.term}','${c.key}','${pid}')">${c.label}</div>`).join('');
        return `<div class="gloss-card">
          <div class="gloss-cat-row">
            <div class="gloss-term">${g.term}${g._new?'<span class="new-badge">NEW</span>':''}</div>
            <div style="position:relative;display:inline-block;">
              <span class="gloss-cat-badge" onclick="togglePicker('${pid}')">${clabel} ▾</span>
              <div class="gloss-cat-picker" id="${pid}">${opts}</div>
            </div>
          </div>
          <div class="gloss-full">${g.full}</div>
          <div class="gloss-def">${g.def}</div>
          <div class="gloss-why">${g.why}</div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

      return `<div class="ins-card">
        <div class="ins-card-header" onclick="togIns('${prefix}${idx}')">
          <div class="ins-title">${item.title}</div>
          <div class="ins-toggle" id="itog-${prefix}${idx}">▼</div>
        </div>
        <div class="ins-body" id="ibody-${prefix}${idx}">
          <div class="ins-chain">${chainHtml(item.chain)}</div>
          ${eth}
          <div class="ins-insight">
            <div class="ins-insight-label">注意方向</div>
            ${item.insight}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('panel-ins').innerHTML = `
    <div class="ins-legend">
      <div class="ins-legend-item"><span class="badge b-core">CORE</span> 直接影響 AI 架構與算力，必須追蹤</div>
      <div class="ins-legend-item"><span class="badge b-noise">NOISE</span> 短期雜訊或技術細節，了解即可</div>
      <div class="ins-legend-item"><span class="badge b-opp">OPP</span> 與 AI 轉型直接相關的應用突破</div>
    </div>
    <div class="ins-subtabs">
      <button class="ins-stab" id="istab-core"  onclick="swIns('core')">CORE（${groups.core.length}）</button>
      <button class="ins-stab" id="istab-noise" onclick="swIns('noise')">NOISE（${groups.noise.length}）</button>
      <button class="ins-stab" id="istab-opp"   onclick="swIns('opp')">OPP（${groups.opp.length}）</button>
    </div>
    <div class="ins-subpanel" id="isp-core">${accordionCards(groups.core,'c')}</div>
    <div class="ins-subpanel" id="isp-noise">${accordionCards(groups.noise,'n')}</div>
    <div class="ins-subpanel" id="isp-opp">${accordionCards(groups.opp,'o')}</div>`;

  swIns('core');
}

function swIns(tab) {
  ['core','noise','opp'].forEach(t => {
    document.getElementById('isp-'+t).classList.remove('active');
    document.getElementById('istab-'+t).classList.remove('active-core','active-noise','active-opp');
  });
  document.getElementById('isp-'+tab).classList.add('active');
  document.getElementById('istab-'+tab).classList.add('active-'+tab);
}

function togIns(id) {
  const body = document.getElementById('ibody-'+id);
  const tog  = document.getElementById('itog-'+id);
  body.classList.toggle('open');
  tog.textContent = body.classList.contains('open') ? '▲' : '▼';
}

// ══════════════════════════════════════════════════════════════════
//  HISTORY PANEL
// ══════════════════════════════════════════════════════════════════
function renderHistory(hist) {
  if (!hist || !hist.length) {
    document.getElementById('panel-hist').innerHTML = '<div class="empty-state">尚無歷史紀錄。</div>';
    return;
  }
  const cards = hist.map((d,i) => {
    const ws = d.weekly_summary
      ? `<div class="weekly-box"><div class="ws-title">📊 本週摘要（週報）</div><div class="ws-body">${d.weekly_summary}</div></div>` : '';
    const hw = d.hw?.length ? `<div class="hist-sec">🔩 硬體缺口</div><div class="news-grid">${d.hw.map(x=>newsCard(x,'hw')).join('')}</div>` : '';
    const co = d.corp?.length ? `<div class="hist-sec">💰 巨頭角力</div><div class="news-grid">${d.corp.map(x=>newsCard(x,'corp')).join('')}</div>` : '';
    const ap = d.app?.length ? `<div class="hist-sec">🤖 新興應用</div><div class="news-grid">${d.app.map(x=>newsCard(x,'app')).join('')}</div>` : '';
    const savedNote = loadNote(d.date);
    const noteSection = `
      <div class="hist-note-section">
        <div class="hist-note-label">📝 我的筆記</div>
        <textarea class="hist-note-area" id="note-${d.date}"
          placeholder="輸入今日觀察、想法、或貼上相關連結..."
          oninput="saveNote('${d.date}',this.value)">${savedNote}</textarea>
        <div class="hist-note-saved" id="note-saved-${d.date}"></div>
      </div>`;
    return `<div class="hist-card ${d.is_friday?'hist-friday':''}">
      <div class="hist-header" onclick="tog(${i})">
        <div class="hist-date-row">
          <span class="hist-date">${fmtDate(d.date)}</span>
          ${d.is_friday?'<span class="fri-badge">📊 週報</span>':''}
          ${savedNote?'<span style="font-size:11px;color:var(--insight);">📝</span>':''}
        </div>
        <div class="hist-meta">
          <span class="hist-count">🔩${d.hw?.length||0} 💰${d.corp?.length||0} 🤖${d.app?.length||0}</span>
          <span class="hist-toggle" id="ht${i}">▼</span>
        </div>
      </div>
      <div class="hist-body hidden" id="hb${i}">${ws}${hw}${co}${ap}${noteSection}</div>
    </div>`;
  }).join('');
  document.getElementById('panel-hist').innerHTML = `
    <div class="sec-title">近一週每日紀錄（最新在上，最多 7 天）</div>
    <div class="hist-list">${cards}</div>`;
}

function loadNote(date) {
  try { return localStorage.getItem('note_'+date) || ''; } catch(e) { return ''; }
}

let _noteSaveTimer = {};
function saveNote(date, text) {
  try { localStorage.setItem('note_'+date, text); } catch(e) {}
  clearTimeout(_noteSaveTimer[date]);
  _noteSaveTimer[date] = setTimeout(() => {
    const el = document.getElementById('note-saved-'+date);
    if (el) { el.textContent = '已儲存'; setTimeout(()=>{ if(el) el.textContent=''; }, 2000); }
  }, 600);
}

function tog(i) {
  const b = document.getElementById('hb'+i);
  const t = document.getElementById('ht'+i);
  b.classList.toggle('hidden');
  t.textContent = b.classList.contains('hidden') ? '▼' : '▲';
}

// ══════════════════════════════════════════════════════════════════
//  MANUAL IMPORT
// ══════════════════════════════════════════════════════════════════
function openModal() {
  document.getElementById('json-input').value = '';
  document.getElementById('import-msg').textContent = '';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function importJSON() {
  const raw = document.getElementById('json-input').value.trim();
  const msg = document.getElementById('import-msg');
  if (!raw) { msg.textContent='⚠️ 請貼上 JSON 後再匯入。'; msg.className='msg-error'; return; }
  let data;
  try {
    const cleaned = raw.replace(/^```json?\n?/,'').replace(/\n?```$/,'').trim();
    data = JSON.parse(cleaned);
  } catch(e) { msg.textContent='❌ JSON 格式有誤。'; msg.className='msg-error'; return; }
  if (!data.date||!data.hw||!data.corp||!data.app) {
    msg.textContent='❌ 缺少必要欄位。'; msg.className='msg-error'; return;
  }
  const idx = HISTORY.findIndex(h => h.date === data.date);
  if (idx >= 0) HISTORY[idx] = data; else HISTORY.push(data);
  saveLocalCache(HISTORY);
  renderAll(HISTORY);
  msg.textContent = `✅ ${fmtDate(data.date)} 的資料已匯入！`; msg.className='msg-ok';
  setTimeout(closeModal, 1500);
}

// ══════════════════════════════════════════════════════════════════
//  TAB SWITCHING
// ══════════════════════════════════════════════════════════════════
const TCLS = {hw:'t-hw',corp:'t-corp',app:'t-app',gloss:'t-gloss',ins:'t-ins',hist:'t-hist'};
function sw(tab) {
  Object.keys(TCLS).forEach(k => {
    document.getElementById('panel-'+k).classList.remove('active');
    document.getElementById('btn-'+k).classList.remove(...Object.values(TCLS));
  });
  document.getElementById('panel-'+tab).classList.add('active');
  document.getElementById('btn-'+tab).classList.add(TCLS[tab]);
}

// ══════════════════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════════════════
function renderAll(hist) {
  document.getElementById('today-label').textContent = '🗓 ' + fmtDate(hist[0].date);
  renderHW(hist[0]);
  renderCorp(hist[0]);
  renderApp(hist[0]);
  renderGlossary(hist);
  renderInsights(hist[0]);
  renderHistory(hist);
}

async function init() {
  ['hw','corp','app','gloss','ins','hist'].forEach(p => {
    document.getElementById('panel-'+p).innerHTML =
      '<div class="loading-screen"><div class="spinner"></div><div class="loading-text">載入最新資料中...</div></div>';
  });
  sw('hw');
  const hist = await fetchHistory();
  if (!hist || !hist.length) {
    document.getElementById('panel-hw').innerHTML = '<div class="empty-state">⚠️ 無法載入資料。請確認 data/history.json 存在於 repo 中。</div>';
    return;
  }
  renderAll(hist);
  sw('hw');
}

init();
</script>

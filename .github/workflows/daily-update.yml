name: 📡 Daily AI Tracker Update

on:
  repository_dispatch:
    types: [daily-trigger]  # cron-job.org POST /repos/.../dispatches
  workflow_dispatch:        # 手動備用
    inputs:
      pigeon_only:
        description: '只發送飛鴿收件者（略過 GitHub Secret 收件人）'
        required: false
        default: 'false'
        type: string
      force:
        description: '強制重新生成（略過冪等保護，重新抓新聞+呼叫 Groq）'
        required: false
        default: 'false'
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (clean tree)
        run: git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install groq ddgs

      - name: Run daily update
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID:       ${{ secrets.NOTION_DB_ID }}
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.pigeon_only }}" = "true" ]; then
            EXTRA="$EXTRA --pigeon-only"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            EXTRA="$EXTRA --force"
          fi
          python scripts/update_data.py $EXTRA

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update ${{ env.TODAY }}"
          file_pattern: 'data/history.json data/notes_backup.json data/run_stats.json'
